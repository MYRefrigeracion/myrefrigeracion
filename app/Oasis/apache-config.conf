# Configuración Apache para PWA Oasis
<VirtualHost *:80>
    ServerName oasis.bienestarcorporal.com
    DocumentRoot "D:/Webs/Oasis"
    
    # Redirección a HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName oasis.bienestarcorporal.com
    DocumentRoot "D:/Webs/Oasis"
    
    # Certificados SSL (usar certificados reales)
    SSLEngine on
    SSLCertificateFile "path/to/ssl/certificate.crt"
    SSLCertificateKeyFile "path/to/ssl/certificate.key"
    
    # Configuración para PWA
    Header set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    
    # Configuración para Service Worker
    <FilesMatch "service-worker.js">
        Header set Service-Worker-Allowed "/"
    </FilesMatch>
    
    # Configuración para Cache
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/cache-manifest "access plus 0 seconds"
        ExpiresByType text/javascript "access plus 1 year"
        ExpiresByType application/javascript "access plus 1 year"
        ExpiresByType image/x-icon "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType image/webp "access plus 1 year"
        ExpiresByType application/x-font-ttf "access plus 1 year"
        ExpiresByType application/x-font-woff "access plus 1 year"
        ExpiresByType application/x-font-woff2 "access plus 1 year"
        ExpiresByType application/vnd.ms-fontobject "access plus 1 year"
    </IfModule>
</VirtualHost>
